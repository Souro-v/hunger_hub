name: hunger_hub
description: HungryHub - Food Delivery App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_database: ^11.3.10
  firebase_messaging: ^15.2.10

  # ── State Management ──
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # ── Navigation ──
  go_router: ^13.2.0

  # ── DI ──
  get_it: ^7.6.4

  # ── Network / Image ──
  cached_network_image: ^3.3.1
  dio: ^5.4.0

  # ── Storage ──
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # ── Map ──
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # ── Location ──
  geolocator: ^11.0.0

  # ── UI ──
  flutter_rating_bar: ^4.0.1
  share_plus: ^7.2.2
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # ── Fonts ──
  google_fonts: ^6.1.0

  # ── Models ──
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  # ── Notifications ──
  flutter_local_notifications: ^17.1.2
  flutter_launcher_icons: ^0.13.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1
  flutter_native_splash: ^2.3.10


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#FF6B35"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  color_dark: "#FFFFFF"
  image_dark: assets/images/logo.png
  android: true
  ios: true
  web: true
  android_12:
    image: assets/images/logo.png
    color: "#FFFFFF"
    icon_background_color: "#FFFFFF"