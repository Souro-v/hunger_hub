name: hunger_hub
description: HungryHub - Food Delivery App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6

  # ── State Management ──
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # ── Navigation ──
  go_router: ^13.2.0

  # ── DI ──
  get_it: ^7.6.4

  # ── Network / Image ──
  cached_network_image: ^3.3.1
  dio: ^5.4.0

  # ── Storage ──
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  # ── Map ──
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # ── Location & Map ──
  geolocator: ^11.0.0

  # ── UI ──
  flutter_rating_bar: ^4.0.1
  share_plus: ^7.2.2
  lottie: ^3.0.0
  shimmer: ^3.0.0
  # ── Fonts ──
  google_fonts: ^6.1.0

  # ── Models ──
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

